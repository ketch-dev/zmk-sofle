CONFIG_ZMK_SLEEP=n

# Dongle is the split central and host-facing device.
CONFIG_ZMK_DISPLAY=y
CONFIG_ZMK_HID_REPORT_TYPE_NKRO=y
CONFIG_USB_HID_POLL_INTERVAL_MS=1
CONFIG_BT_CTLR_TX_PWR_PLUS_8=y

CONFIG_ZMK_BLE_PASSKEY_ENTRY=n
CONFIG_ZMK_BLE_CLEAR_BONDS_ON_START=n

CONFIG_EC11=n
CONFIG_ZMK_POINTING=n
CONFIG_ZMK_BACKLIGHT=n
CONFIG_ZMK_EXT_POWER=n
CONFIG_ZMK_PM_SOFT_OFF=n
CONFIG_ZMK_STUDIO=n
CONFIG_ZMK_BLE_MANAGEMENT=n
CONFIG_ZMK_BLE_MANAGEMENT_STUDIO_RPC=n
CONFIG_ZMK_RUNTIME_INPUT_PROCESSOR=n
CONFIG_ZMK_RUNTIME_INPUT_PROCESSOR_STUDIO_RPC=n
CONFIG_ZMK_SETTINGS_RPC=n
CONFIG_ZMK_SETTINGS_RPC_STUDIO=n
CONFIG_ZMK_RUNTIME_SENSOR_ROTATE=n
CONFIG_ZMK_RUNTIME_SENSOR_ROTATE_STUDIO_RPC=n
