CONFIG_ZMK_SLEEP=y

#EXT POWER
CONFIG_ZMK_EXT_POWER=n

#BLE-passkey
CONFIG_ZMK_BLE_PASSKEY_ENTRY=n

#BLE-clean
CONFIG_ZMK_BLE_CLEAR_BONDS_ON_START=n

#usb-name
CONFIG_USB_DEVICE_MANUFACTURER="sofle"

CONFIG_BT_CTLR_TX_PWR_PLUS_8=y

# Gaming over USB
CONFIG_USB_HID_POLL_INTERVAL_MS=1
CONFIG_ZMK_HID_REPORT_TYPE_NKRO=y

#EC11 enable
CONFIG_EC11=y
CONFIG_EC11_TRIGGER_GLOBAL_THREAD=y
CONFIG_ZMK_POINTING=n

# enable display drivers
CONFIG_ZMK_DISPLAY=n

# === Studio (Central only) ===
CONFIG_ZMK_STUDIO=n
CONFIG_ZMK_BLE_MANAGEMENT=n
CONFIG_ZMK_BLE_MANAGEMENT_STUDIO_RPC=n

# === Runtime Input Processor (Central only) ===
CONFIG_ZMK_RUNTIME_INPUT_PROCESSOR=n
CONFIG_ZMK_RUNTIME_INPUT_PROCESSOR_STUDIO_RPC=n

# === Settings RPC (Central only) ===
CONFIG_ZMK_SETTINGS_RPC=n
CONFIG_ZMK_SETTINGS_RPC_STUDIO=n

# === Runtime Sensor Rotate (Encoder, Central only) ===
CONFIG_ZMK_RUNTIME_SENSOR_ROTATE=n
CONFIG_ZMK_RUNTIME_SENSOR_ROTATE_STUDIO_RPC=n

# === Settings (Central only) ===
CONFIG_SETTINGS=y

# === Battery (Central only) ===
CONFIG_ZMK_BATTERY_HISTORY=n
CONFIG_ZMK_BATTERY_HISTORY_STUDIO_RPC=n

# === Split (Central only) ===
CONFIG_ZMK_SPLIT_RELAY_EVENT=y
CONFIG_ZMK_SPLIT_BLE_CENTRAL_SPLIT_RUN_STACK_SIZE=1024
CONFIG_ZMK_SETTINGS_SAVE_DEBOUNCE=10000
